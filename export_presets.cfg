; Preset d'export Android / Meta Quest (phase 5).
; ATTENTION : remplace "com.PLACEHOLDER.galaxyexplorer" par ton vrai identifiant
; de package (ex. com.tonstudio.galaxyexplorer) avant tout export sérieux.
;
; XR : xr_features/xr_mode=1 => OpenXR (loader Khronos intégré à Godot 4.6).
; Le plugin OpenXR Vendors ajoute, dans la fenêtre d'export de l'éditeur, une
; section "Meta XR Features" (hand tracking, passthrough, etc.) — laissée OFF ici.
; Pour les activer PLUS TARD (hors périmètre actuel) : ouvre Projet > Exporter,
; sélectionne ce preset, et coche dans "Meta XR Features" :
;   - Hand Tracking  -> meta_xr_features/hand_tracking (0=No,1=Optional,2=Required)
;   - Passthrough    -> meta_xr_features/passthrough   (0=None,1=Optional,2=Required)
;
; Signature release : NE PAS écrire de mot de passe ici. Laisse keystore/release*
; vide et fournis le keystore via variables d'environnement (voir checklist) :
;   GODOT_ANDROID_KEYSTORE_RELEASE_PATH / _USER / _PASSWORD

